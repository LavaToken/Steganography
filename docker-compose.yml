version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stego_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stego_db
    ports:
      - "5432:5432"
    volumes:
      - stego_pg_data:/var/lib/postgresql/data

volumes:
  stego_pg_data:
